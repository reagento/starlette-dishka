target-version = "py310"

line-length = 79

include = [
    "src/**.py",
    "tests/**.py",
    "examples/**.py",
    "noxfile.py",
]

[lint]
preview = true
select = ["ALL"]
ignore = [
    "ARG",
    "D",
    "CPY001",
    "RUF029",
    "RET505",
    "ISC003",
    ########
    "PLR6201",
    "PLR6301",
    ########
    "EM101",
    "EM102",
    ########
    "SIM114",
    ########
    "TC001",
    "TC002",
    "TC003",
    "TC006",
]

[lint.per-file-ignores]
"examples/**" = [
    "INP001",
    "S104",
]
"tests/**" = [
    "PT001",
    "PT023",
    ########
    "S101",
]

[lint.isort]
force-wrap-aliases = true
combine-as-imports = true
no-lines-before = ["local-folder"]

# https://docs.astral.sh/ruff/settings/#lint_flake8-tidy-imports_ban-relative-imports
[lint.flake8-tidy-imports]
ban-relative-imports = "parents"

# https://docs.astral.sh/ruff/settings/#lint_flake8-tidy-imports_banned-api
[lint.flake8-tidy-imports.banned-api]
"contextlib.suppress" = { msg = "Use `try-except-pass` instead" }

[lint.pylint]
# https://docs.astral.sh/ruff/rules/too-many-arguments/
# https://docs.astral.sh/ruff/settings/#lint_pylint_max-args
max-args = 10